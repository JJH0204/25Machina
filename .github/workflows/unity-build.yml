name: Unity Build (Windows & APK)

on:
  push:
    branches: [ main ] # 메인 브랜치에 푸시될 때 실행

jobs:
  # [절차 1] 우분투 러너가 윈도우 PC를 깨웁니다.
  wake-on-lan:
    runs-on: [self-hosted, wol-runner] # 우분투에 설치한 러너 태그
    steps:
      - name: Send WOL Magic Packet
        run: wakeonlan ${{ secrets.WINDOWS_MAC_ADDR }}
      - name: Wait for Windows to boot
        run: sleep 30 # PC가 켜지고 러너 서비스가 온라인이 될 때까지 잠시 대기

  # [절차 2] 깨어난 윈도우 PC가 빌드를 수행합니다.
  build-unity:
    needs: wake-on-lan
    runs-on: [self-hosted, windows-build] # 윈도우 PC에 설치한 러너 태그
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 윈도우 빌드 수행
      - name: Build for Windows
        run: |
          $repoRoot = Get-Location
          $appDataRoot = Join-Path $repoRoot "unity_appdata"
          
          # 환경 변수 절대 경로 설정 및 필요한 하위 디렉토리 강제 생성
          $env:LOCALAPPDATA = Join-Path $appDataRoot "Local"
          $env:APPDATA = Join-Path $appDataRoot "Roaming"
          $env:USERPROFILE = Join-Path $appDataRoot "User"
          $env:TEMP = Join-Path $appDataRoot "Temp"
          $env:TMP = Join-Path $appDataRoot "Temp"
          
          # Unity가 캐시를 저장할 경로들을 미리 생성 (계층 구조 포함)
          New-Item -ItemType Directory -Path (Join-Path $env:LOCALAPPDATA "Unity\Caches") -Force
          New-Item -ItemType Directory -Path (Join-Path $env:APPDATA "Unity") -Force
          New-Item -ItemType Directory -Path $env:TEMP -Force
          
          Write-Host "LOCALAPPDATA redirected to: $env:LOCALAPPDATA"
          
          $projectPath = Join-Path $repoRoot "Branch"
          $logFile = Join-Path $repoRoot "unity_windows_build.log"
          
          & "C:\Program Files\Unity\Hub\Editor\2022.3.62f3\Editor\Unity.exe" `
            -batchmode `
            -nographics `
            -quit `
            -projectPath "$projectPath" `
            -executeMethod _GameAssets._01._Scripts.Editor.BuildScript.BuildWindows `
            -logFile "$logFile"

      # 빌드 결과 확인 (디버깅용)
      - name: Verify Build Files
        run: |
          Write-Host "Checking for build output in Branch/Builds/Windows..."
          if (Test-Path "Branch/Builds/Windows") {
            Get-ChildItem -Path "Branch/Builds/Windows" -Recurse
          } else {
            Write-Error "Build directory 'Branch/Builds/Windows' not found!"
            exit 1
          }

      # 인스톨러 생성 (Inno Setup 사용)
      - name: Create Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer_script.iss"
      
      # 안드로이드 빌드 수행
      - name: Build for Android (APK)
        run: |
          $repoRoot = Get-Location
          $appDataRoot = Join-Path $repoRoot "unity_appdata"
          
          $env:LOCALAPPDATA = Join-Path $appDataRoot "Local"
          $env:APPDATA = Join-Path $appDataRoot "Roaming"
          $env:USERPROFILE = Join-Path $appDataRoot "User"
          $env:TEMP = Join-Path $appDataRoot "Temp"
          $env:TMP = Join-Path $appDataRoot "Temp"
          
          $projectPath = Join-Path $repoRoot "Branch"
          $logFile = Join-Path $repoRoot "unity_android_build.log"
          
          & "C:\Program Files\Unity\Hub\Editor\2022.3.62f3\Editor\Unity.exe" `
            -batchmode `
            -nographics `
            -quit `
            -projectPath "$projectPath" `
            -executeMethod _GameAssets._01._Scripts.Editor.BuildScript.BuildAndroid `
            -logFile "$logFile"

      # 결과물 업로드 (깃허브 액션 탭에서 다운로드 가능)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Professional-Build
          path: |
            Output/Machina_Setup.exe
            Branch/Builds/Android/Machina.apk